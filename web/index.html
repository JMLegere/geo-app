      left: 50%;

      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;

    }

    }

    .cover {
      display:block;

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async="" crossorigin="anonymous"></script>

  <script>
    // Capture JS errors outside Dart's runZonedGuarded — MapLibre crashes,
    // WebGL context loss, unhandled promise rejections. Stored in
    // sessionStorage and flushed to app_logs by LogFlushService.
    (function() {
      var key = 'earthnova_js_errors';
      function push(msg) {
        try {
          var arr = JSON.parse(sessionStorage.getItem(key) || '[]');
          arr.push('[' + new Date().toISOString() + '] ' + msg);
          if (arr.length > 50) arr = arr.slice(-50);
          sessionStorage.setItem(key, JSON.stringify(arr));
        } catch(_) {}
      }

      window.onerror = function(msg, src, line, col, err) {
        var detail = '[JS-ERROR] ' + msg + ' @ ' + (src||'?') + ':' + (line||0) + ':' + (col||0);
        if (err && err.stack) detail += '\n' + err.stack.split('\n').slice(0, 5).join('\n');
        push(detail);
      };

      window.onunhandledrejection = function(e) {
        push('[JS-REJECTION] ' + (e.reason ? (e.reason.message || e.reason) : 'unknown'));
      };

      // WebGL context loss — fires when GPU memory is reclaimed
      document.addEventListener('webglcontextlost', function(e) {
        push('[WEBGL-LOST] context lost');
      }, true);

      document.addEventListener('webglcontextrestored', function(e) {
        push('[WEBGL-RESTORED] context restored');
      }, true);
    })();
  </script>

</body></html>
