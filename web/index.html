<!DOCTYPE html><html lang="en"><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="fog_of_world">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Fog of World</title>
  <link rel="manifest" href="manifest.json">
  <!-- maplibre_gl Flutter package (0.25.0) requires MapLibre GL JS v4.
       Self-hosted so Arc/WebKit content blockers cannot intercept a
       cross-origin CDN request. maplibre-gl@4.7.1 — last stable v4.
       LAZY-LOADED: Injected after Flutter bootstrap completes to avoid
       WebGL context competition on iOS Safari. -->
  <link href="maplibre-gl.css" rel="stylesheet">
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #0D1B2A;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0D1B2A;
          }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async="" crossorigin="anonymous"></script>

  <script>
    (function() {
      var OBS_KEY = 'earthnova_obs';
      var BEACON_URL = 'https://bfaczcsrpfcbijoaeckb.supabase.co/functions/v1/beacon-events';
      var MAX_BYTES = 2097152;

      function ensureUuid(key) {
        var existing = localStorage.getItem(key);
        if (existing) return existing;
        var value = (window.crypto && window.crypto.randomUUID)
          ? window.crypto.randomUUID()
          : '10000000-1000-4000-8000-100000000000'.replace(/[018]/g, function(c) {
              return (+c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> +c / 4).toString(16);
            });
        localStorage.setItem(key, value);
        return value;
      }

      ensureUuid('earthnova_session_id');
      ensureUuid('earthnova_device_id');

      function push(category, event, msg) {
        try {
          var sid = ensureUuid('earthnova_session_id');
          var did = ensureUuid('earthnova_device_id');
          var entry = JSON.stringify({
            session_id: sid, device_id: did, user_id: null,
            category: category, event: event,
            data: { msg: msg },
            created_at: new Date().toISOString()
          });
          var arr = JSON.parse(localStorage.getItem(OBS_KEY) || '[]');
          arr.push(entry);
          var s = JSON.stringify(arr);
          while (s.length > MAX_BYTES && arr.length > 1) { arr.shift(); s = JSON.stringify(arr); }
          localStorage.setItem(OBS_KEY, s);
        } catch(_) {}
      }

      // --- Lazy-load MapLibre after Flutter bootstrap ---
      // iOS Safari has limited WebGL contexts (~8-16 per tab). Loading MapLibre
      // in <head> caused a race condition with CanvasKit. Solution: inject
      // maplibre-gl.js after Flutter's runApp() completes.
      var _mapLibreInjected = false;
      function _injectMapLibre() {
        if (_mapLibreInjected) return;
        _mapLibreInjected = true;
        var script = document.createElement('script');
        script.src = 'maplibre-gl.js';
        script.async = true;
        script.onload = function() {
          try { push('js', 'maplibre_lazy_loaded', maplibregl.version || 'unknown'); } catch(e) {}
        };
        script.onerror = function() {
          push('js', 'maplibre_load_failed', 'script error');
        };
        document.head.appendChild(script);
      }

      // Intercept Flutter loader setup to inject MapLibre after runApp completes.
      //
      // WHY: flutter_bootstrap.js (loaded async) does:
      //   window._flutter.loader || (window._flutter.loader = new FlutterLoader)
      //   _flutter.loader.load({ serviceWorkerSettings: ... })
      //
      // Our inline script runs BEFORE flutter_bootstrap.js loads, so
      // window._flutter doesn't exist yet — a direct monkey-patch always fails.
      //
      // FIX: Pre-create window._flutter and define a property descriptor with a
      // setter on 'loader'. When flutter_bootstrap.js assigns the real loader
      // instance, our setter wraps its load() before anyone can call it.
      window._flutter = window._flutter || {};
      (function() {
        var _loaderInstance;
        Object.defineProperty(window._flutter, 'loader', {
          configurable: true,
          enumerable: true,
          get: function() { return _loaderInstance; },
          set: function(loaderInstance) {
            // Wrap load() so we can hook into the Flutter bootstrap lifecycle.
            var _origLoad = loaderInstance.load.bind(loaderInstance);
            loaderInstance.load = function(config) {
              return _origLoad(Object.assign({}, config, {
                onEntrypointLoaded: async function(engineInitializer) {
                  // initializeEngine loads CanvasKit and acquires WebGL contexts.
                  var appRunner = await engineInitializer.initializeEngine();
                  // runApp() renders the first Flutter frame.
                  await appRunner.runApp();
                  // Small buffer for first frame to commit before MapLibre
                  // competes for WebGL contexts.
                  await new Promise(function(r) { setTimeout(r, 100); });
                  push('js', 'flutter_bootstrap_complete', 'before_maplibre_inject');
                  _injectMapLibre();
                }
              }));
            };
            _loaderInstance = loaderInstance;
          }
        });
      })();

      // Fallback: If the defineProperty setter never fired (e.g. flutter_bootstrap.js
      // set _flutter.loader before our descriptor was in place), inject after 5s.
      setTimeout(function() {
        if (!_mapLibreInjected) {
          push('js', 'maplibre_fallback_inject', 'flutter_bootstrap_never_fired');
          _injectMapLibre();
        }
      }, 5000);

      // Route console.error and console.warn into observability so all JS-level
      // noise (MapLibre tile errors, CanvasKit warnings, browser GL messages)
      // flows into app_logs in Supabase automatically — no DevTools needed.
      // console.log is intentionally excluded: MapLibre logs every tile fetch,
      // producing hundreds of events per minute with no diagnostic value.
      var _origError = console.error;
      var _origWarn  = console.warn;

      // Dedup ring buffer — suppress consecutive identical messages so a
      // repeated MapLibre tile error doesn't fill the beacon buffer by itself.
      var _recentMsgs = [];
      var _DEDUP_SIZE = 8;
      function _isDup(msg) {
        if (_recentMsgs.indexOf(msg) !== -1) return true;
        _recentMsgs.push(msg);
        if (_recentMsgs.length > _DEDUP_SIZE) _recentMsgs.shift();
        return false;
      }

      console.error = function() {
        try {
          var msg = Array.prototype.slice.call(arguments).join(' ').substring(0, 500);
          if (!_isDup(msg)) push('js', 'console_error', msg);
        } catch(_) {}
        _origError.apply(console, arguments);
      };

      console.warn = function() {
        try {
          var msg = Array.prototype.slice.call(arguments).join(' ').substring(0, 500);
          if (!_isDup(msg)) push('js', 'console_warn', msg);
        } catch(_) {}
        _origWarn.apply(console, arguments);
      };

      // Log which MapLibre GL JS version the browser actually executed.
      // Catches CDN-cached v5 being served despite the v4.7.1 pin in index.html.
      // Deferred 500ms so the CDN script (in <head>) has finished executing
      // before we read window.maplibregl.
      setTimeout(function() {
        try {
          var mlVersion = (window.maplibregl && maplibregl.version) || 'not-loaded';
          push('js', 'maplibre_version', mlVersion);
        } catch(_) {}
      }, 500);

      window.onerror = function(msg, src, line, col, err) {
        var detail = msg + ' @ ' + (src||'?') + ':' + (line||0) + ':' + (col||0);
        if (err && err.stack) detail += '\n' + err.stack.split('\n').slice(0, 5).join('\n');
        push('js', 'js_error', detail);
      };

      window.onunhandledrejection = function(e) {
        push('js', 'js_rejection', e.reason ? (e.reason.message || String(e.reason)) : 'unknown');
      };

      document.addEventListener('webglcontextlost', function() {
        push('js', 'webgl_context_lost', 'context lost');
      }, true);

      document.addEventListener('webglcontextrestored', function() {
        push('js', 'webgl_context_restored', 'context restored');
      }, true);

      // WebGL + CanvasKit health monitor — polls every 2s.
      // Detects context loss, GL errors, WASM heap growth, canvas death.
      var _lastHealthy = true;
      setInterval(function() {
        try {
          var canvas = document.querySelector('canvas');
          if (!canvas) { if (_lastHealthy) { push('js', 'health', 'canvas element missing'); _lastHealthy = false; } return; }

          var gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
          if (!gl) { if (_lastHealthy) { push('js', 'health', 'no WebGL context'); _lastHealthy = false; } return; }

          var lost = gl.isContextLost();
          var err = gl.getError();
          var wasmHeap = 0;
          try { wasmHeap = window.flutterCanvasKit && window.flutterCanvasKit.HEAPU8 ? window.flutterCanvasKit.HEAPU8.buffer.byteLength : 0; } catch(_) {}

          if (lost || err !== 0) {
            var msg = 'contextLost=' + lost + ' glError=' + err + ' wasmHeap=' + wasmHeap + ' canvas=' + canvas.width + 'x' + canvas.height;
            push('js', 'webgl_unhealthy', msg);
            _lastHealthy = false;
          } else if (!_lastHealthy) {
            push('js', 'webgl_recovered', 'context healthy again wasmHeap=' + wasmHeap);
            _lastHealthy = true;
          }

          // Log heap size every 30s (every 15th poll) so we can see memory
          // growth leading up to a page kill. Only when healthy — unhealthy
          // path already includes wasmHeap.
          if (!_heapCounter) _heapCounter = 0;
          if (++_heapCounter % 15 === 0 && !lost) {
            push('js', 'heap_sample', 'wasmHeap=' + Math.round(wasmHeap / 1048576) + 'MB canvas=' + canvas.width + 'x' + canvas.height);
          }
        } catch(_) {}
      }, 2000);

      // Apply iOS 18 flat-shading crash fix (WebKit bug #289601).
      setTimeout(function() {
        try {
          var canvas = document.querySelector('canvas');
          if (!canvas) return;
          var gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
          if (!gl) return;
          var epv = gl.getExtension('WEBGL_provoking_vertex');
          if (epv) {
            epv.provokingVertexWEBGL(epv.FIRST_VERTEX_CONVENTION_WEBGL);
            push('js', 'ios_fix', 'WEBGL_provoking_vertex applied');
          }
        } catch(_) {}
      }, 3000);

      function sendBeacon() {
        try {
          var raw = localStorage.getItem(OBS_KEY);
          if (!raw) return;
          var arr = JSON.parse(raw);
          if (!arr.length) return;

          // Parse and batch in chunks of 50. Previously >50 entries caused the
          // entire buffer to be silently skipped — events stuck forever.
          var events = [];
          for (var i = 0; i < arr.length; i++) {
            try { events.push(JSON.parse(arr[i])); } catch(_) {}
          }

          var batch = events.slice(0, 50);
          var remainder = arr.slice(batch.length); // keep unparsed remainder

          navigator.sendBeacon(BEACON_URL, JSON.stringify(batch));
          if (remainder.length > 0) {
            localStorage.setItem(OBS_KEY, JSON.stringify(remainder));
          } else {
            localStorage.removeItem(OBS_KEY);
          }
        } catch(_) {}
      }

      // Periodic flush every 30s so JS-side events (console_error,
      // maplibre_version, webgl_unhealthy etc.) reach Supabase during an
      // active session — not just on page hide/close.
      setInterval(sendBeacon, 30000);

      // --- OPFS cleanup helper for Dart ---
      // Enumerates and deletes all entries in the OPFS root.
      // Called by Dart via JS interop when resetting web database storage.
      window.deleteAllOpfs = async function() {
        try {
          var root = await navigator.storage.getDirectory();
          for await (var name of root.keys()) {
            await root.removeEntry(name, { recursive: true });
            console.log('[OPFS] deleted: ' + name);
          }
        } catch(e) {
          console.log('[OPFS] cleanup error: ' + e);
        }
      };

      // --- Page lifecycle observability ---
      // Log visibility transitions so we can distinguish iOS killing a
      // backgrounded page (hidden → gap → reboot) from memory pressure
      // during active use (visible → gap → reboot).
      document.addEventListener('visibilitychange', function() {
        var state = document.visibilityState;
        var heapMB = 0;
        try { heapMB = Math.round((window.flutterCanvasKit.HEAPU8.buffer.byteLength || 0) / 1048576); } catch(_) {}
        push('js', 'visibility_' + state, 'heap=' + heapMB + 'MB');
        if (state === 'hidden') sendBeacon();
      });
      document.addEventListener('pagehide', function() {
        var heapMB = 0;
        try { heapMB = Math.round((window.flutterCanvasKit.HEAPU8.buffer.byteLength || 0) / 1048576); } catch(_) {}
        push('js', 'pagehide', 'heap=' + heapMB + 'MB');
        sendBeacon();
      });
    })();
  </script>

</body></html>
