        window.addEventListener('error', function(event) {
          var target = event.target;
          if (!target || target === window) return;
          push('low_level', 'resource_error', 'resource_error', lowLevelAttrs(
            'low_level.resource',
            'failed',
            target,
            {
              resource_tag: target.tagName ? target.tagName.toLowerCase() : 'unknown',
              resource_url_host: target.src || target.href
                ? (function(url) {
                    try { return new URL(url).host; } catch (_) { return 'unparseable'; }
                  })(target.src || target.href)
                : null
            }
          ));
        }, listenerOptions);

        function logClipboard(action, event) {
          push('low_level', 'clipboard_event', action, lowLevelAttrs(
            'low_level.clipboard',
            'completed',
            event.target,
            { clipboard_action: action }
          ));
        }

        document.addEventListener('copy', function(event) {
          logClipboard('copy', event);
        }, listenerOptions);
        document.addEventListener('cut', function(event) {
          logClipboard('cut', event);
        }, listenerOptions);
        document.addEventListener('paste', function(event) {
          logClipboard('paste', event);
        }, listenerOptions);
      }

      installLowLevelEventTelemetry();

      // --- MapLibre lazy-load: inject between initializeEngine and runApp ---
      //
      // PROBLEM SPACE (see docs/ios-safari-maplibre.md for full analysis):
      //
      // Three constraints must be satisfied simultaneously:
      //   1. CanvasKit must acquire its WebGL context BEFORE MapLibre (iOS Safari
      //      has ~8-16 WebGL contexts per tab — first-come, first-served).
      //   2. window.maplibregl must exist BEFORE MapLibreMap widget builds
      //      (the Flutter plugin calls `new maplibregl.Map(...)` on first frame).
      //   3. The injection point must be after flutter_bootstrap.js loads
      //      (our inline script runs before the async bootstrap; window._flutter
      //      doesn't exist yet so a direct monkey-patch always silently fails).
      //
      // SOLUTION: Object.defineProperty setter on window._flutter.loader
      //   - Pre-create window._flutter so flutter_bootstrap.js sees it and skips
      //     re-creating it (the `|| (window._flutter = {})` guard).
      //   - Define a setter on .loader — fires when flutter_bootstrap.js assigns
      //     the real FlutterLoader instance.
      //   - In load(), wrap onEntrypointLoaded:
      //       await initializeEngine(engineConfig) → CanvasKit done, WebGL context held
      //       inject + await maplibre             → maplibregl ready, no context race
      //       await runApp()                      → first frame: MapLibreMap finds maplibregl
      //
      var _mapLibreInjected = false;

      // Intercept Flutter loader assignment via property descriptor.
      window._flutter = window._flutter || {};
      (function() {
        var _loaderInstance;
        Object.defineProperty(window._flutter, 'loader', {
          configurable: true,
          enumerable: true,
          get: function() { return _loaderInstance; },
          set: function(loaderInstance) {
            var _origLoad = loaderInstance.load.bind(loaderInstance);
            loaderInstance.load = function(config) {
              return _origLoad(Object.assign({}, config, {
                onEntrypointLoaded: async function(engineInitializer) {
                  // Step 1: CanvasKit init — acquires WebGL context(s).
                  // Preserve Flutter's engine config instead of calling
                  // initializeEngine() bare; newer web engine paths can fail
                  // before the first frame if the config object is dropped.
                  var engineConfig = (config && config.config) || {};
                  var appRunner = await engineInitializer.initializeEngine(engineConfig);

                  // Step 2: Inject MapLibre and WAIT for script to execute.
                  // Running between initializeEngine and runApp ensures:
                  //   a) CanvasKit already holds its WebGL context (no race).
                  //   b) maplibregl is defined before the first Flutter frame.
                  await new Promise(function(resolve) {
                    if (window.maplibregl) {
                      push('js', 'maplibre_already_loaded', 'before_runapp', {
                        flow: 'web.bootstrap',
                        phase: 'dependency_ready',
                        dependency: 'maplibre'
                      });
                      resolve(); return;
                    }
                    if (_mapLibreInjected) {
                      // Another path started the inject; poll until ready.
                      var poll = setInterval(function() {
                        if (window.maplibregl) { clearInterval(poll); resolve(); }
                      }, 50);
                      setTimeout(function() { clearInterval(poll); resolve(); }, 3000);
                      return;
                    }
                    _mapLibreInjected = true;
                    var s = document.createElement('script');
                    s.src = 'maplibre-gl.js';
                    s.onload = function() {
                      try {
                        push('js', 'maplibre_lazy_loaded', (maplibregl && maplibregl.version) || 'unknown', {
                          flow: 'web.bootstrap',
                          phase: 'dependency_ready',
                          dependency: 'maplibre'
                        });
                      } catch(e) {}
                      push('js', 'flutter_bootstrap_complete', 'maplibre_ready_before_runapp', {
                        flow: 'web.bootstrap',
                        phase: 'completed'
                      });
                      // Hook into MapLibre Map lifecycle for render-failure diagnosis.
                      // Patches the constructor so every Map instance emits error/load/idle
                      // events into observability — essential for blank-map diagnosis on iOS Safari.
                      if (window.maplibregl) {
                        try {
                          var origMap = maplibregl.Map;
                          var emitMapLibreIdle = function(map) {
                            try {
                              var loaded = !!(map.loaded && map.loaded());
                              var tilesLoaded = !!(map.areTilesLoaded && map.areTilesLoaded());
                              var detail = {
                                source: 'maplibre_js_idle',
                                loaded: loaded,
                                tilesLoaded: tilesLoaded,
                                at: Date.now()
                              };
                              if (loaded && tilesLoaded) {
                                window.__earthnovaMapLibreIdle = detail;
                                window.dispatchEvent(new CustomEvent('earthnova.maplibre.idle', { detail: detail }));
                                emitMapLibreLayout(map, detail.source);
                              } else {
                                push('js', 'maplibre_map_idle_pending', JSON.stringify(detail));
                              }
                            } catch(e) {
                              push('js', 'maplibre_map_idle_bridge_failed', (e && e.message) || String(e));
                            }
                          };
                          var emitMapLibreLayout = function(map, source) {
                            try {
                              var mapEl = map && map.getContainer ? map.getContainer() : null;
                              var canvas = map && map.getCanvas ? map.getCanvas() : null;
                              var canvasContainer = canvas && canvas.parentElement ? canvas.parentElement : null;
                              var platformView = mapEl && mapEl.closest ? mapEl.closest('flt-platform-view') : null;
                              if (!platformView) platformView = document.querySelector('flt-platform-view');
                              var mapRect = mapEl ? mapEl.getBoundingClientRect() : null;
                              var canvasRect = canvas ? canvas.getBoundingClientRect() : null;
                              var canvasContainerRect = canvasContainer ? canvasContainer.getBoundingClientRect() : null;
                              var platformViewRect = platformView ? platformView.getBoundingClientRect() : null;
                              var layoutNormalized = false;
                              var requestedResize = false;
                              if (mapRect && mapRect.width > 0 && mapRect.height > 0) {
                                var mapWidthPx = Math.round(mapRect.width);
                                var mapHeightPx = Math.round(mapRect.height);
                                var mapLeftPx = Math.round(mapRect.left);
                                var mapTopPx = Math.round(mapRect.top);
                                var canvasContainerNeedsLayout = canvasContainerRect && Math.round(canvasContainerRect.height) === 0;
                                var platformViewNeedsLayout = platformViewRect && Math.round(platformViewRect.height) === 0;
                                if (canvasContainerNeedsLayout && canvasContainer) {
                                  canvasContainer.style.position = 'absolute';
                                  canvasContainer.style.left = '0';
                                  canvasContainer.style.top = '0';
                                  canvasContainer.style.width = mapWidthPx + 'px';
                                  canvasContainer.style.height = mapHeightPx + 'px';
                                  canvasContainer.style.overflow = 'hidden';
                                  layoutNormalized = true;
                                }
                                if (platformViewNeedsLayout && platformView) {
                                  platformView.style.display = 'block';
                                  platformView.style.position = 'absolute';
                                  platformView.style.left = mapLeftPx + 'px';
                                  platformView.style.top = mapTopPx + 'px';
                                  platformView.style.width = mapWidthPx + 'px';
                                  platformView.style.height = mapHeightPx + 'px';
                                  platformView.style.overflow = 'hidden';
                                  layoutNormalized = true;
                                }
                                if (layoutNormalized && map && map.resize) {
                                  requestedResize = true;
                                  map.resize();
                                }
                              }
                              var canvasContainerRectAfter = canvasContainer ? canvasContainer.getBoundingClientRect() : null;
                              var platformViewRectAfter = platformView ? platformView.getBoundingClientRect() : null;
                              push('map', 'web_layout_sample', source, {
                                flow: 'map.web_layout',
                                phase: 'state_changed',
                                dependency: 'maplibre_layout',
                                map_width_px: mapRect ? Math.round(mapRect.width) : null,
                                map_height_px: mapRect ? Math.round(mapRect.height) : null,
                                canvas_width_px: canvasRect ? Math.round(canvasRect.width) : null,
                                canvas_height_px: canvasRect ? Math.round(canvasRect.height) : null,
                                canvas_container_width_px: canvasContainerRect ? Math.round(canvasContainerRect.width) : null,
                                canvas_container_height_px: canvasContainerRect ? Math.round(canvasContainerRect.height) : null,
                                canvas_container_width_after_px: canvasContainerRectAfter ? Math.round(canvasContainerRectAfter.width) : null,
                                canvas_container_height_after_px: canvasContainerRectAfter ? Math.round(canvasContainerRectAfter.height) : null,
                                platform_view_width_px: platformViewRect ? Math.round(platformViewRect.width) : null,
                                platform_view_height_px: platformViewRect ? Math.round(platformViewRect.height) : null,
                                platform_view_width_after_px: platformViewRectAfter ? Math.round(platformViewRectAfter.width) : null,
                                platform_view_height_after_px: platformViewRectAfter ? Math.round(platformViewRectAfter.height) : null,
                                layout_normalized: layoutNormalized,
                                layout_normalization_requested_resize: requestedResize
                              });
                            } catch(e) {
                              push('js', 'maplibre_layout_bridge_failed', (e && e.message) || String(e));
                            }
                          };
                          var emitMapLibreLoad = function(map) {
                            try {
                              var detail = {
                                source: 'maplibre_js_load',
                                at: Date.now()
                              };
                              window.__earthnovaMapLibreLoad = detail;
                              window.dispatchEvent(new CustomEvent('earthnova.maplibre.load', { detail: detail }));
                              emitMapLibreLayout(map, detail.source);
                            } catch(e) {
                              push('js', 'maplibre_map_load_bridge_failed', (e && e.message) || String(e));
                            }
                          };
                          maplibregl.Map = function(opts) {
                            var map = new origMap(opts);
                            map.on('error', function(e) {
                              push('js', 'maplibre_map_error', (e && e.error && e.error.message) || 'unknown');
                            });
                            map.on('load', function() {
                              push('js', 'maplibre_map_load', 'tiles_ready');
                              emitMapLibreLoad(map);
                            });
                            map.on('resize', function() {
                              push('js', 'maplibre_map_resize', 'container_resized');
                              emitMapLibreLayout(map, 'maplibre_js_resize');
                            });
                            map.on('idle', function() {
                              push('js', 'maplibre_map_idle', 'render_complete');
                              emitMapLibreIdle(map);
                            });
                            return map;
                          };
                          maplibregl.Map.prototype = origMap.prototype;
                        } catch(e) {}
                      }
                      resolve();
                    };
                    s.onerror = function() {
                      push('js', 'maplibre_load_failed', 'script error', {
                        flow: 'web.bootstrap',
                        phase: 'dependency_failed',
                        dependency: 'maplibre'
                      });
                      resolve(); // still run app — map shows error state
                    };
                    document.head.appendChild(s);
                  });

                  // Step 3: First Flutter frame — maplibregl is guaranteed ready.
                  await appRunner.runApp();
                }
              }));
            };
            _loaderInstance = loaderInstance;
          }
        });
      })();

      // Fallback: if the defineProperty setter never fired (e.g. flutter_bootstrap.js
      // ran before our descriptor was registered), inject MapLibre after 5s so the
      // user at least gets a map eventually. The map widget will likely be in an
      // error state and need a page reload, but tiles will render if it recovers.
      setTimeout(function() {
        if (!_mapLibreInjected) {
          push('js', 'maplibre_fallback_inject', 'flutter_bootstrap_never_fired', {
            flow: 'web.bootstrap',
            phase: 'waiting_on',
            dependency: 'flutter_loader'
          });
          _mapLibreInjected = true;
          var s = document.createElement('script');
          s.src = 'maplibre-gl.js';
          s.onload = function() {
            try {
              push('js', 'maplibre_lazy_loaded', (maplibregl && maplibregl.version) || 'unknown', {
                flow: 'web.bootstrap',
                phase: 'dependency_ready',
                dependency: 'maplibre'
              });
            } catch(e) {}
          };
          s.onerror = function() {
            push('js', 'maplibre_load_failed', 'script error', {
              flow: 'web.bootstrap',
              phase: 'dependency_failed',
              dependency: 'maplibre'
            });
          };
          document.head.appendChild(s);
        }
      }, 5000);

      // Route console.error and console.warn into observability so all JS-level
      // noise (MapLibre tile errors, CanvasKit warnings, browser GL messages)
      // flows into Supabase telemetry automatically — no DevTools needed.
      // console.log is intentionally excluded: MapLibre logs every tile fetch,
      // producing hundreds of events per minute with no diagnostic value.
      var _origError = console.error;
      var _origWarn  = console.warn;

      // Dedup ring buffer — suppress consecutive identical messages so a
      // repeated MapLibre tile error doesn't fill the beacon buffer by itself.
      var _recentMsgs = [];
      var _DEDUP_SIZE = 8;
      function _isDup(msg) {
        if (_recentMsgs.indexOf(msg) !== -1) return true;
        _recentMsgs.push(msg);
        if (_recentMsgs.length > _DEDUP_SIZE) _recentMsgs.shift();
        return false;
      }

      console.error = function() {
        try {
          var msg = Array.prototype.slice.call(arguments).join(' ').substring(0, 500);
          if (!_isDup(msg)) push('js', 'console_error', msg);
        } catch(_) {}
        _origError.apply(console, arguments);
      };

      console.warn = function() {
        try {
          var msg = Array.prototype.slice.call(arguments).join(' ').substring(0, 500);
          if (!_isDup(msg)) push('js', 'console_warn', msg);
        } catch(_) {}
        _origWarn.apply(console, arguments);
      };

      // Log which MapLibre GL JS version the browser actually executed.
      // Catches CDN-cached v5 being served despite the v4.7.1 pin in index.html.
      // Deferred 500ms so the CDN script (in <head>) has finished executing
      // before we read window.maplibregl.
      setTimeout(function() {
        try {
          var mlVersion = (window.maplibregl && maplibregl.version) || 'not-loaded';
          push('js', 'maplibre_version', mlVersion);
        } catch(_) {}
      }, 500);

      window.onerror = function(msg, src, line, col, err) {
        var detail = msg + ' @ ' + (src||'?') + ':' + (line||0) + ':' + (col||0);
        if (err && err.stack) detail += '\n' + err.stack.split('\n').slice(0, 5).join('\n');
        push('js', 'js_error', detail);
      };

      window.onunhandledrejection = function(e) {
        push('js', 'js_rejection', e.reason ? (e.reason.message || String(e.reason)) : 'unknown');
      };

      document.addEventListener('webglcontextlost', function() {
        push('js', 'webgl_context_lost', 'context lost');
      }, true);

      document.addEventListener('webglcontextrestored', function() {
        push('js', 'webgl_context_restored', 'context restored');
      }, true);

      // WebGL + CanvasKit health monitor — polls every 2s.
      // Detects context loss, GL errors, WASM heap growth, canvas death.
      var _lastHealthy = true;
      setInterval(function() {
        try {
          var canvas = document.querySelector('canvas');
          if (!canvas) { if (_lastHealthy) { push('js', 'health', 'canvas element missing'); _lastHealthy = false; } return; }

          var gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
          if (!gl) { if (_lastHealthy) { push('js', 'health', 'no WebGL context'); _lastHealthy = false; } return; }

          var lost = gl.isContextLost();
          var err = gl.getError();
          var wasmHeap = 0;
          try { wasmHeap = window.flutterCanvasKit && window.flutterCanvasKit.HEAPU8 ? window.flutterCanvasKit.HEAPU8.buffer.byteLength : 0; } catch(_) {}

          if (lost || err !== 0) {
            var msg = 'contextLost=' + lost + ' glError=' + err + ' wasmHeap=' + wasmHeap + ' canvas=' + canvas.width + 'x' + canvas.height;
            push('js', 'webgl_unhealthy', msg);
            _lastHealthy = false;
          } else if (!_lastHealthy) {
            push('js', 'webgl_recovered', 'context healthy again wasmHeap=' + wasmHeap);
            _lastHealthy = true;
          }

          // Log heap size every 30s (every 15th poll) so we can see memory
          // growth leading up to a page kill. Only when healthy — unhealthy
          // path already includes wasmHeap.
          if (!_heapCounter) _heapCounter = 0;
          if (++_heapCounter % 15 === 0 && !lost) {
            push('js', 'heap_sample', 'wasmHeap=' + Math.round(wasmHeap / 1048576) + 'MB canvas=' + canvas.width + 'x' + canvas.height);
          }
        } catch(_) {}
      }, 2000);

      // Apply iOS 18 flat-shading crash fix (WebKit bug #289601).
      setTimeout(function() {
        try {
          var canvas = document.querySelector('canvas');
          if (!canvas) return;
          var gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
          if (!gl) return;
          var epv = gl.getExtension('WEBGL_provoking_vertex');
          if (epv) {
            epv.provokingVertexWEBGL(epv.FIRST_VERTEX_CONVENTION_WEBGL);
            push('js', 'ios_fix', 'WEBGL_provoking_vertex applied');
          }
        } catch(_) {}
      }, 3000);

      function sendBeacon() {
        try {
          var raw = localStorage.getItem(OBS_KEY);
          if (!raw) return;
          var arr = JSON.parse(raw);
          if (!arr.length) return;

          // Parse and batch in chunks of 50. Previously >50 entries caused the
          // entire buffer to be silently skipped — events stuck forever.
          var events = [];
          var sid = activeSessionId();
          var did = activeDeviceId();
          for (var i = 0; i < arr.length; i++) {
            try {
              var entry = JSON.parse(arr[i]);
              if (entry.session_id !== sid) {
                entry.attributes = Object.assign({}, entry.attributes || {}, {
                  bootstrap_session_id: entry.session_id
                });
                entry.session_id = sid;
              }
              entry.device_id = entry.device_id || did;
              events.push(entry);
            } catch(_) {}
          }

          var batch = events.slice(0, 50);
          var remainder = arr.slice(batch.length); // keep unparsed remainder

          if (!BEACON_URL) {
            localStorage.removeItem(OBS_KEY);
            return;
          }

          var envelope = {
            resource: {
              service_name: 'earthnova-web-bootstrap',
              deployment_environment: telemetryEnvironment(),
              platform: 'web'
            },
            logs: batch,
            spans: []
          };

          navigator.sendBeacon(BEACON_URL, JSON.stringify(envelope));
          if (remainder.length > 0) {
            localStorage.setItem(OBS_KEY, JSON.stringify(remainder));
          } else {
            localStorage.removeItem(OBS_KEY);
          }
        } catch(_) {}
      }

      // Periodic flush every 30s so JS-side events (console_error,
      // maplibre_version, webgl_unhealthy etc.) reach Supabase during an
      // active session — not just on page hide/close.
      setInterval(sendBeacon, 30000);

      // --- OPFS cleanup helper for Dart ---
      // Enumerates and deletes all entries in the OPFS root.
      // Called by Dart via JS interop when resetting web database storage.
      window.deleteAllOpfs = async function() {
        try {
          var root = await navigator.storage.getDirectory();
          for await (var name of root.keys()) {
            await root.removeEntry(name, { recursive: true });
            console.log('[OPFS] deleted: ' + name);
          }
        } catch(e) {
          console.log('[OPFS] cleanup error: ' + e);
        }
      };

      // --- Page lifecycle observability ---
      // Log visibility transitions so we can distinguish iOS killing a
      // backgrounded page (hidden → gap → reboot) from memory pressure
      // during active use (visible → gap → reboot).
      document.addEventListener('visibilitychange', function() {
        var state = document.visibilityState;
        var heapMB = 0;
        try { heapMB = Math.round((window.flutterCanvasKit.HEAPU8.buffer.byteLength || 0) / 1048576); } catch(_) {}

      });

        var heapMB = 0;
        try { heapMB = Math.round((window.flutterCanvasKit.HEAPU8.buffer.byteLength || 0) / 1048576); } catch(_) {}
        push('js', 'pagehide', 'heap=' + heapMB + 'MB');
        sendBeacon();
      });
    })();
  </script>
