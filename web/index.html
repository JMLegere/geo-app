  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #0D1B2A;
          background-size: 100% 100%;

    .center {
      margin: 0;

      left: 50%;

    }

    .cover {

      transform: translate(-50%, 0);
    }

    .bottomLeft {

        background-color: #0D1B2A;

  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";

</head>
<body>
  
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async="" crossorigin="anonymous"></script>

  <script>
    (function() {
      var OBS_KEY = 'earthnova_obs';
      var BEACON_URL = 'https://bfaczcsrpfcbijoaeckb.supabase.co/functions/v1/beacon-events';
      var MAX_BYTES = 2097152;

      function push(category, event, msg) {
        try {
          var sid = localStorage.getItem('earthnova_session_id') || 'unknown';
          var did = localStorage.getItem('earthnova_device_id') || 'unknown';
          var entry = JSON.stringify({
            session_id: sid, device_id: did, user_id: null,
            category: category, event: event,
            data: { msg: msg },
            created_at: new Date().toISOString()
          });
          var arr = JSON.parse(localStorage.getItem(OBS_KEY) || '[]');
          arr.push(entry);
          var s = JSON.stringify(arr);
          while (s.length > MAX_BYTES && arr.length > 1) { arr.shift(); s = JSON.stringify(arr); }
          localStorage.setItem(OBS_KEY, s);
        } catch(_) {}
      }

      window.onerror = function(msg, src, line, col, err) {
        var detail = msg + ' @ ' + (src||'?') + ':' + (line||0) + ':' + (col||0);
        if (err && err.stack) detail += '\n' + err.stack.split('\n').slice(0, 5).join('\n');
        push('js', 'js_error', detail);
      };

      window.onunhandledrejection = function(e) {
        push('js', 'js_rejection', e.reason ? (e.reason.message || String(e.reason)) : 'unknown');
      };

      document.addEventListener('webglcontextlost', function() {
        push('js', 'webgl_context_lost', 'context lost');
      }, true);

      document.addEventListener('webglcontextrestored', function() {
        push('js', 'webgl_context_restored', 'context restored');
      }, true);

      // WebGL + CanvasKit health monitor — polls every 2s.
      // Detects context loss, GL errors, WASM heap growth, canvas death.
      var _lastHealthy = true;
      setInterval(function() {
        try {
          var canvas = document.querySelector('canvas');
          if (!canvas) { if (_lastHealthy) { push('js', 'health', 'canvas element missing'); _lastHealthy = false; } return; }

          var gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
          if (!gl) { if (_lastHealthy) { push('js', 'health', 'no WebGL context'); _lastHealthy = false; } return; }

          var lost = gl.isContextLost();
          var err = gl.getError();
          var wasmHeap = 0;
          try { wasmHeap = window.flutterCanvasKit && window.flutterCanvasKit.HEAPU8 ? window.flutterCanvasKit.HEAPU8.buffer.byteLength : 0; } catch(_) {}

          if (lost || err !== 0) {
            var msg = 'contextLost=' + lost + ' glError=' + err + ' wasmHeap=' + wasmHeap + ' canvas=' + canvas.width + 'x' + canvas.height;
            push('js', 'webgl_unhealthy', msg);
            _lastHealthy = false;
          } else if (!_lastHealthy) {
            push('js', 'webgl_recovered', 'context healthy again');
            _lastHealthy = true;
          }
        } catch(_) {}
      }, 2000);

      // Apply iOS 18 flat-shading crash fix (WebKit bug #289601).
      setTimeout(function() {
        try {
          var canvas = document.querySelector('canvas');
          if (!canvas) return;
          var gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
          if (!gl) return;
          var epv = gl.getExtension('WEBGL_provoking_vertex');
          if (epv) {
            epv.provokingVertexWEBGL(epv.FIRST_VERTEX_CONVENTION_WEBGL);
            push('js', 'ios_fix', 'WEBGL_provoking_vertex applied');
          }
        } catch(_) {}
      }, 3000);

      function sendBeacon() {
        try {
          var raw = localStorage.getItem(OBS_KEY);
          if (!raw) return;
          var arr = JSON.parse(raw);
          var events = [];
          for (var i = 0; i < arr.length; i++) {
            try { events.push(JSON.parse(arr[i])); } catch(_) {}
          }
          if (events.length > 0 && events.length <= 50) {
            navigator.sendBeacon(BEACON_URL, JSON.stringify(events));
            localStorage.removeItem(OBS_KEY);
          }
        } catch(_) {}
      }

      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') sendBeacon();
      });
      document.addEventListener('pagehide', sendBeacon);
    })();
  </script>

</body></html>
