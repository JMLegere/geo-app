name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  UNITY_VERSION: 2022.3.64f1

jobs:
  build:
    name: Unity Build
    environment: Unity
    # Skip forked PRs because secrets are unavailable there.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Validate Unity secrets
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${UNITY_LICENSE:-}" ] && missing+=("UNITY_LICENSE")
          [ -z "${UNITY_EMAIL:-}" ] && missing+=("UNITY_EMAIL")
          [ -z "${UNITY_PASSWORD:-}" ] && missing+=("UNITY_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            echo "Ensure UNITY_LICENSE (ulf contents), UNITY_EMAIL, and UNITY_PASSWORD are set."
            exit 1
          fi

      - name: Cache Unity
        uses: actions/cache@v4
        with:
          path: ~/.cache/unity3d
          key: ${{ runner.os }}-unity-${{ env.UNITY_VERSION }}

      - name: Build Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneLinux64
          buildName: ci-build

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unity-logs
          path: |
            Logs
            Library/PackageCache
          if-no-files-found: ignore
