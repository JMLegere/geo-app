name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "::error::No coverage file generated"
            exit 1
          fi

          # Count lines
          TOTAL=$(grep -c 'DA:' coverage/lcov.info || echo 0)
          HIT=$(grep 'DA:' coverage/lcov.info | grep -cv ',0$' || echo 0)

          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No coverage data found"
            exit 1
          fi

          PCT=$(( HIT * 100 / TOTAL ))
          echo "Coverage: $HIT/$TOTAL lines = ${PCT}%"

          # Fail if coverage drops below 80%
          if [ "$PCT" -lt 80 ]; then
            echo "::error::Coverage ${PCT}% is below 80% threshold"
            exit 1
          fi

          echo "✅ Coverage ${PCT}% meets 80% threshold"
