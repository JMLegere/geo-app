name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run tests
        env:
          LD_LIBRARY_PATH: .
        run: flutter test
