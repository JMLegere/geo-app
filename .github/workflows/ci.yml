name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  UNITY_VERSION: 2022.3.64f1
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

jobs:
  build:
    name: Unity Build
    environment: Unity
    # Run automatically on pushes and same-repo PRs; skip forks (secrets unavailable).
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For PRs, build the contributor's head commit when the repo is trusted.
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
      - name: Prepare Unity license file
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [ -z "${UNITY_LICENSE}" ]; then
            echo "UNITY_LICENSE is unavailable. This usually means the run is from a forked PR or the Unity environment secret is not configured."
            exit 1
          fi
          # Write the license to a file that is mounted into the build container.
          mkdir -p "${GITHUB_WORKSPACE}/.licenses"
          printf '%s' "${UNITY_LICENSE}" > "${GITHUB_WORKSPACE}/.licenses/UnityLicense.ulf"
      - name: Debug license presence (no secret content)
        run: |
          ls -la "${GITHUB_WORKSPACE}/.licenses"
          wc -c "${GITHUB_WORKSPACE}/.licenses/UnityLicense.ulf"
          echo "UNITY_LICENSE length: ${#UNITY_LICENSE}"
          env | grep '^UNITY_' || true

      - name: Cache Unity
        uses: actions/cache@v4
        with:
          # Cache only the Unity downloader cache; avoid ~/.local/share/unity3d where the license is stored.
          path: ~/.cache/unity3d
          key: ${{ runner.os }}-unity-${{ env.UNITY_VERSION }}

      - name: Build Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_LICENSE_FILE: ${{ github.workspace }}/.licenses/UnityLicense.ulf
        with:
          projectPath: .
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneLinux64
          buildName: ci-build
          unityLicense: ${{ secrets.UNITY_LICENSE }}

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unity-logs
          path: |
            Logs
            Library/PackageCache
          if-no-files-found: ignore

      - name: Clean up Unity license file
        if: always()
        run: rm -f "${GITHUB_WORKSPACE}/.licenses/UnityLicense.ulf"
