name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "::error::No coverage file generated"
            exit 1
          fi

          # Exclude files not suitable for unit testing
          python3 -c "
          import re
          with open('coverage/lcov.info') as f:
              content = f.read()
          records = content.split('end_of_record')
          exclude_patterns = [
              r'supabase_.*_repository\.dart',
              r'supabase_.*_adapter\.dart',
              r'presentation/screens/.*\.dart',
              r'presentation/widgets/.*\.dart',
              r'presentation/painters/.*\.dart'
          ]
          filtered = []
          for r in records:
              if not r.strip():
                  continue
              if not any(re.search(p, r) for p in exclude_patterns):
                  filtered.append(r)
          with open('coverage/lcov.info', 'w') as f:
              f.write('end_of_record\n'.join(filtered) + ('end_of_record\n' if filtered else ''))
          "

          # Count lines
          TOTAL=$(grep -c 'DA:' coverage/lcov.info || echo 0)
          HIT=$(grep 'DA:' coverage/lcov.info | grep -cv ',0$' || echo 0)

          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No coverage data found"
            exit 1
          fi

          PCT=$(( HIT * 100 / TOTAL ))
          echo "Coverage: $HIT/$TOTAL lines = ${PCT}%"

          # Fail if covered lines < 95% of total (avoids integer division rounding)
          THRESHOLD=$(( TOTAL * 95 / 100 ))
          if [ "$HIT" -lt "$THRESHOLD" ]; then
            echo "::error::Coverage ${PCT}% ($HIT/$TOTAL) is below 95% threshold (need $THRESHOLD)"
            exit 1
          fi

          echo "✅ Coverage ${PCT}% ($HIT/$TOTAL) meets 95% threshold (need $THRESHOLD)"
