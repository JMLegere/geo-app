name: Deploy Supabase

# Trigger after CI passes on main branch
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Allow manual trigger for emergency deployments
  workflow_dispatch:

env:
  PROJECT_REF: bfaczcsrpfcbijoaeckb

jobs:
  deploy:
    name: Deploy Migrations & Edge Functions
    runs-on: ubuntu-latest
    # Only run if CI succeeded (or if manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # For workflow_run, we need to fetch the head commit
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: |
          supabase link --project-ref ${{ env.PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check for Edge Function changes
        id: changes
        run: |
          # Get the commit range for this workflow_run event
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            # For workflow_run, compare against the previous commit
            BASE_COMMIT="${{ github.event.workflow_run.head_commit.id }}~1"
            HEAD_COMMIT="${{ github.event.workflow_run.head_commit.id }}"
          else
            # For manual dispatch, always deploy
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if any files under supabase/functions/ changed
          if git diff --name-only "$BASE_COMMIT" "$HEAD_COMMIT" | grep -q '^supabase/functions/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Edge Functions
        if: ${{ steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' }}
        run: |
          supabase functions deploy validate-encounter --project-ref ${{ env.PROJECT_REF }}
          supabase functions deploy enrich-species --project-ref ${{ env.PROJECT_REF }}
          supabase functions deploy admin-purge-enrichments --project-ref ${{ env.PROJECT_REF }}
          supabase functions deploy enrich-location --project-ref ${{ env.PROJECT_REF }}
          supabase functions deploy enrich-species-batch --project-ref ${{ env.PROJECT_REF }}
          supabase functions deploy enrich-locations-batch --project-ref ${{ env.PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deployment summary
        run: |
          echo "✅ Supabase deployment complete"
          echo "  - Migrations: pushed"
          echo "  - Edge Functions: deployed"
          echo "  - Project: ${{ env.PROJECT_REF }}"
