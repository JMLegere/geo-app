name: Deploy Supabase

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_REF: bfaczcsrpfcbijoaeckb

jobs:
  deploy:
    name: Deploy Migrations & Edge Functions
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ env.PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply pending migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Seed species table from assets/species_data.json
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          API="https://api.supabase.com/v1/projects/$PROJECT_REF/database/query"
          AUTH="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

          # Check if species table already has data — skip if so.
          COUNT=$(curl -s -X POST "$API" -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"query": "SELECT count(*) as n FROM species"}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['n'] if isinstance(d,list) and len(d)>0 else '0')")

          echo "Species table has $COUNT rows"
          if [ "$COUNT" != "0" ]; then
            echo "Table already seeded — skipping."
          else
            echo "Seeding species table..."
            python3 - <<'PYEOF'
          import json, os, urllib.request, sys

          api = f"https://api.supabase.com/v1/projects/{os.environ['PROJECT_REF']}/database/query"
          token = os.environ["SUPABASE_ACCESS_TOKEN"]

          with open("assets/species_data.json") as f:
              species = json.load(f)

          print(f"Loaded {len(species)} species from JSON")

          BATCH = 500
          total = 0
          failed = 0

          for i in range(0, len(species), BATCH):
              batch = species[i:i+BATCH]
              values = []
              for s in batch:
                  sci = s["scientificName"]
                  def_id = f"fauna_{sci.lower().replace(' ', '_')}"
                  # Escape single quotes for SQL
                  esc = lambda v: str(v).replace("'", "''")
                  values.append(
                      f"('{esc(def_id)}','{esc(sci)}','{esc(s['commonName'])}','{esc(s['taxonomicClass'])}','{esc(s['iucnStatus'])}','{esc(json.dumps(s['habitats']))}','{esc(json.dumps(s['continents']))}')"
                  )
              sql = (
                  "INSERT INTO species (definition_id,scientific_name,common_name,taxonomic_class,iucn_status,habitats_json,continents_json) VALUES "
                  + ",".join(values)
                  + " ON CONFLICT (definition_id) DO NOTHING"
              )
              body = json.dumps({"query": sql}).encode()
              req = urllib.request.Request(api, data=body, headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              })
              try:
                  with urllib.request.urlopen(req) as resp:
                      result = json.loads(resp.read())
                      if isinstance(result, dict) and result.get("error"):
                          print(f"Batch {i}: ERROR {result['error']}", file=sys.stderr)
                          failed += len(batch)
                      else:
                          total += len(batch)
              except Exception as e:
                  print(f"Batch {i}: FAILED {e}", file=sys.stderr)
                  failed += len(batch)

              if (i // BATCH) % 10 == 0:
                  print(f"  {total} / {len(species)} seeded...")

          print(f"Done: {total} seeded, {failed} failed")
          if failed > 0:
              sys.exit(1)
          PYEOF
          fi

      - name: Deploy Edge Functions
        run: |
          # Inject pipeline version (commit SHA) for enrichment versioning
          PIPELINE_VERSION=$(git rev-parse --short HEAD)
          echo "Setting PIPELINE_VERSION=$PIPELINE_VERSION"
          supabase secrets set PIPELINE_VERSION=$PIPELINE_VERSION --project-ref ${{ env.PROJECT_REF }}

          supabase functions deploy validate-encounter --project-ref ${{ env.PROJECT_REF }}
          supabase functions deploy enrich-location --project-ref ${{ env.PROJECT_REF }}
          supabase functions deploy enrich-locations-batch --project-ref ${{ env.PROJECT_REF }}
          supabase functions deploy process-enrichment-queue --no-verify-jwt --project-ref ${{ env.PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deployment summary
        run: |
          echo "✅ Supabase deployment complete"
          echo "  - Migrations: applied via supabase db push"
          echo "  - Species: seeded if empty"
          echo "  - Edge Functions: deployed"
          echo "  - Project: ${{ env.PROJECT_REF }}"
