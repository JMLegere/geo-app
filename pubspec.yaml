name: earth_nova
description: EarthNova — friendly, social geogame. Real world GPS + fog-of-war + 32,752 IUCN species.
publish_to: 'none'

version: 3.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1

  # Backend — source of truth, no local SQLite
  supabase_flutter: ^2.12.0

  # SHA-256 for _derivePassword + phone hashing in observability
  crypto: ^3.0.6

  # Session IDs in ObservabilityService
  uuid: ^4.5.3

  # Date formatting in SpeciesCard footer
  intl: ^0.20.2

  # Network state detection — powers network.offline / network.online events
  connectivity_plus: ^6.1.4

  # Map rendering — GPS-level real-world tiles + Voronoi overlay (overrides AGENTS.md ban per docs/map-design.md §14)
  maplibre_gl: ^0.20.0

  # GPS location provider — adaptive frequency, ring state detection (overrides AGENTS.md ban per docs/map-design.md §14)
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0D1B2A"
  color_dark: "#0D1B2A"
  android: true
  ios: true
  android_12:
    color: "#0D1B2A"
    color_dark: "#0D1B2A"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
