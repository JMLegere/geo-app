name: fog_of_world
description: A Flutter mobile game — iNaturalist × Stardew Valley × Pokemon Go.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  
  # Geospatial
  geobase: ^1.5.0
  h3_flutter_plus: ^1.0.0
  
  # Map rendering (josxha/flutter-maplibre — chosen in Task 7 spike for children API + WidgetLayer)
  maplibre: ^0.1.2
  
  # Persistence
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.6.0+eol
  
  # Backend
  supabase_flutter: ^2.12.0
  
  # GPS (MIT license, stream-based, iOS + Android + Web)
  geolocator: ^13.0.2
  
  # Utilities
  intl: ^0.20.2
  crypto: ^3.0.6
  web: ^1.1.1
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.14.0
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  image: ^4.1.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0D1B2A"
  color_dark: "#0D1B2A"
  image: assets/icon/app_icon.png
  image_dark: assets/icon/app_icon.png
  android: true
  ios: true
  android_12:
    color: "#0D1B2A"
    icon_background_color: "#0D1B2A"
    image: assets/icon/app_icon.png
    color_dark: "#0D1B2A"
    icon_background_color_dark: "#0D1B2A"
    image_dark: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/
  shaders:
    - shaders/fog.frag
