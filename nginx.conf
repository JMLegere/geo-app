server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Required for SharedArrayBuffer — enables Drift's Web Worker SQLite.
    # Without these, WasmDatabase.open() times out and falls back to
    # direct IndexedDB on the main thread (6s+ writes on iOS).
    # Using credentialless COEP to avoid breaking Supabase/MapLibre fetches.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # HTML, JS entry points, service worker — never cache (so deploys take effect immediately)
    location ~ ^/(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|version\.json|main\.dart\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        try_files $uri =404;
    }

    # JSON data assets — short cache (content changes across deploys, no hash in filename)
    location ~* \.json$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        try_files $uri =404;
    }

    # WASM + drift worker — versioned via query string, cache aggressively.
    # CORP: same-origin required so drift_worker.js loads as SharedWorker under COEP.
    location ~* \.(wasm|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    # Static assets (canvaskit, fonts, images, etc.) — cache aggressively
    location / {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
}
