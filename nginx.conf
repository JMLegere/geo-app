server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # HTML, JS entry points, service worker — never cache (so deploys take effect immediately)
    location ~ ^/(index\.html|flutter_service_worker\.js|version\.json|main\.dart\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Static assets (canvaskit, fonts, images, etc.) — cache aggressively
    location / {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
}
